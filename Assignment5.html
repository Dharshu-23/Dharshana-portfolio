<!DOCTYPE html>
<html>
<head>
<title>Student Grade Calculator</title>
    <!-- Internal CSS -->
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
        }
        input {
            padding: 8px;
            width: 200px;
        }
        button {
            padding: 8px 15px;
            margin-top: 10px;
        }
        #result {
            margin-top: 15px;
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>
<body>
<h2>Student Grade Calculator</h2>
    <input type="number" id="marks" placeholder="Enter marks (0-100)">
    <br>
    <button onclick="calculateGrade()">Calculate Grade</button>
    <div id="result"></div>
    <script>
        function calculateGrade() {
            var marks = document.getElementById("marks").value;
            var grade;
            if (marks >= 90 && marks <= 100) {
                grade = "A+";
            }
            else if (marks >= 80) {
                grade = "A";
            }
            else if (marks >= 70) {
                grade = "B";
            }
            else if (marks >= 60) {
                grade = "C";
            }
            else if (marks >= 50) {
                grade = "D";
            }
            else if (marks >= 0) {
                grade = "Fail";
            }
            else {
                grade = "Invalid Marks";
            }

            document.getElementById("result").innerHTML =
                "Your Grade is: " + grade;
        }
    </script>
</body>
</html>
